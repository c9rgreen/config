#
# General
#

set -g default-terminal "tmux-256color"
set -ag terminal-features ",xterm-ghostty:RGB"
set -ag terminal-features ",xterm-256color:RGB"
set -ag terminal-overrides ",xterm-ghostty:Tc"
set -ag terminal-overrides ",xterm-256color:Tc"

# Enable image passthrough (Ghostty kitty graphics protocol)
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Undercurl support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Longer scrollback
set -g history-limit 50000

# Faster escape (important for vi mode)
set -sg escape-time 10

# Focus events for terminals that support them
set -g focus-events on

# Increase tmux messages display time
set -g display-time 4000

# Refresh status more often
set -g status-interval 5

# Enable mouse
set -g mouse on

# Right-click opens context menu
unbind -n MouseDown3Pane

# Middle-click pastes from clipboard
bind -n MouseDown2Pane run "pbpaste | tmux load-buffer - && tmux paste-buffer"

# Double-click selects word, triple-click selects line
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send -X select-word
bind -n DoubleClick1Pane select-pane \; copy-mode -M \; send -X select-word
bind -T copy-mode-vi TripleClick1Pane select-pane \; send -X select-line
bind -n TripleClick1Pane select-pane \; copy-mode -M \; send -X select-line

# Don't exit copy mode on mouse drag end (allows further selection adjustment)
unbind -T copy-mode-vi MouseDragEnd1Pane

# Scroll speed — 3 lines per tick instead of 5
bind -T copy-mode-vi WheelUpPane select-pane \; send -X -N 3 scroll-up
bind -T copy-mode-vi WheelDownPane select-pane \; send -X -N 3 scroll-down

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

#
# Vi keybindings
#

set -g mode-keys vi
set -g status-keys vi

# Visual selection and yank in copy mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle

# Pane navigation with vi keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing with vi keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

#
# macOS copy/paste
#

# Use pbcopy for yanking in copy mode
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# Enter in copy mode copies to clipboard
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"

#
# Remote / Alma Linux overrides
#

# On remote Linux, use xclip or xsel for clipboard integration.
# Uncomment these and comment out the pbcopy lines above when on Alma Linux:
#
# bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard"
# bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "xclip -selection clipboard"
# bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "xclip -selection clipboard"

# If using OSC 52 clipboard passthrough (works over SSH without xclip):
set -g set-clipboard on

# Use fish as the default shell (resolves path for macOS and Linux)
run-shell 'tmux set -g default-shell "$(command -v fish)"'
set -g default-command "fish"

# Aggressive resize — use the smallest client viewing a *window* rather than
# the smallest client on the *session*. Better for multi-monitor / SSH setups.
setw -g aggressive-resize on

#
# Status line
#

set -g status-position top
set -g status-justify centre
set -g status-style "bg=default,fg=default"

# Left: session name
set -g status-left-length 30
set -g status-left "#[bg=blue,fg=white,bold]  #S #[bg=default,fg=blue] "

# Right: user@host and date/time
set -g status-right-length 80
# Time tracked today (timewarrior). `timew day` footer: "Tracked   8:24:08";
# `timew get dom.active` is 1 while an interval runs. Filled green dot when
# tracking, dim hollow dot when stopped. awk forces numeric conversion so
# "08"/"09" minutes aren't misread as octal.
#
# tmux runs #() jobs under default-shell (fish here), so this must be valid in
# both fish and sh: no `VAR=$(...)` assignment (fish rejects it) — the active
# flag is passed inline via `$(...)`, which both shells support.
#
# tmux runs strftime over the whole status string before the shell, so the
# awk printf specifiers must be doubled (%%d, %%s) — otherwise tmux expands
# `%d` to the day-of-month and awk never sees a real format string.
set -g status-right "#(timew day 2>/dev/null | awk -v a=\"$(timew get dom.active 2>/dev/null)\" '/Tracked/{split($2,t,\":\");h=t[1]+0;m=t[2]+0;dot=(a==1)?\"#[fg=green]●\":\"#[fg=brightblack]○\";printf \"%%s#[fg=brightblack] %%dh%%02dm\",dot,h,m}') #[fg=magenta] #(whoami)#[fg=brightblack]@#[fg=cyan]#h #[fg=yellow,bg=default]  %b %d #[bg=blue,fg=white,bold]  %H:%M "

# Window list
set -g window-status-format "#[fg=brightblack,bg=default]  #I:#W "
set -g window-status-current-format "#[fg=white,bg=blue,bold]  #I:#W "
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=blue"

# Message and command prompt styling
set -g message-style "bg=default,fg=blue,bold"
set -g message-command-style "bg=default,fg=magenta"

# Mode (copy mode highlight)
set -g mode-style "bg=blue,fg=white"
